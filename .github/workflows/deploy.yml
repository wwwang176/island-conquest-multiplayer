name: Deploy to Hetzner

on:
  push:
    branches: [online-demo]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/key
          chmod 600 ~/.ssh/key
          ssh -i ~/.ssh/key -p 2222 -o StrictHostKeyChecking=no root@${{ secrets.HETZNER_HOST }} '
            cd /opt/game &&
            git pull origin online-demo &&
            npm install &&
            npm run build &&
            systemctl restart island-conquest
          '
